<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-4">

<h2 class="text-xl mb-4">Student Submit</h2>

<input id="name" class="w-full p-2 mb-2 bg-gray-800" placeholder="Name">
<input id="batch" class="w-full p-2 mb-2 bg-gray-800" placeholder="SSC Batch">
<input id="school" class="w-full p-2 mb-2 bg-gray-800" placeholder="School">
<input id="year" class="w-full p-2 mb-2 bg-gray-800" placeholder="Year">

<button onclick="submitData()" class="bg-green-600 p-2 w-full">Submit</button>

<script>
async function submitData() {
  const data = {
    name: name.value,
    batch: batch.value,
    school: school.value,
    year: year.value
  }

  await fetch('/api/submit', {
    method: 'POST',
    body: JSON.stringify(data)
  })

  alert("Submitted ✔")
}
</script>

</body>
</html>
