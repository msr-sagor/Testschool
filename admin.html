<input id="pass" placeholder="Password">
<button onclick="load()">Login</button>

<div id="list"></div>

<script>
async function load() {
  const res = await fetch('/api/getStudents')
  const data = await res.json()

  let html = ""

  data.pending.forEach((s, i) => {
    html += `
    <div>
      ${s.name}
      <button onclick="approve(${i})">Approve</button>
    </div>`
  })

  list.innerHTML = html
}

async function approve(i) {
  await fetch('/api/approve', {
    method: 'POST',
    body: JSON.stringify({
      index: i,
      password: pass.value
    })
  })
  load()
}
</script>
